services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    init: true
    working_dir: /workspace/common-archetecture
    command: sleep infinity
    environment:
      TZ: Asia/Tokyo
    volumes:
      - ..:/workspace/common-archetecture:cached
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - appnet

  plantuml:
    image: plantuml/plantuml-server:jetty
    environment:
      TZ: Asia/Tokyo
    ports:
      - "8082:8080"
    networks:
      - appnet

