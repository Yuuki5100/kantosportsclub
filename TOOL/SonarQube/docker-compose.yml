services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube-dev
    depends_on:
      - db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: sonarqube-dev-db
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    volumes:
      - postgresql:/var/lib/postgresql/data
    restart: unless-stopped

  sonar-report-api:
    build:
      context: .
      dockerfile: SonarQubeScriptContainer/Dockerfile
    container_name: sonar-report-api
    environment:
      SONAR_HOST_URL: ${SONAR_HOST_URL:-http://sonarqube:9000}
      SONAR_TOKEN: ${SONAR_TOKEN:?SONAR_TOKEN must be set}
      REPORT_API_KEY: ${REPORT_API_KEY:-}
      REPORT_OUTPUT_DIR: /reports
      REPORT_TIMEOUT: ${REPORT_TIMEOUT:-20}
      REPORT_MAX_ISSUES: ${REPORT_MAX_ISSUES:-0}
      SONAR_EXPORT_SCRIPT_PATH: /app/SonarHtmlExport.py
    ports:
      - "${REPORT_API_PORT:-8080}:8080"
    volumes:
      - ./SonarQubeScriptContainer/generated-reports:/reports
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:
