services:
  backend:
    extends:
      file: ./compose.yml
      service: backend

  gateway:
    extends:
      file: ./compose.yml
      service: gateway

  syncconnector:
    extends:
      file: ./compose.yml
      service: syncconnector

  batchserver:
    extends:
      file: ./compose.yml
      service: batchserver

  frontend:
    extends:
      file: ./compose.yml
      service: frontend

  frontend-zap:
    extends:
      file: ./compose.yml
      service: frontend-zap

  frontend-zap-build:
    extends:
      file: ./compose.yml
      service: frontend-zap-build

  frontend-static:
    extends:
      file: ./compose.yml
      service: frontend-static

  frontend-export:
    extends:
      file: ./compose.yml
      service: frontend-export

  frontend-test:
    extends:
      file: ./compose.yml
      service: frontend-test

  backend-test:
    extends:
      file: ./compose.yml
      service: backend-test

  e2e:
    extends:
      file: ./compose.yml
      service: e2e

  newman:
    extends:
      file: ./compose.yml
      service: newman

  k6:
    extends:
      file: ./compose.yml
      service: k6

  zap-baseline:
    extends:
      file: ./compose.yml
      service: zap-baseline

  wiremock:
    image: wiremock/wiremock:latest
    container_name: jems-wiremock
    environment:
      TZ: Asia/Tokyo
    ports:
      - "${WIREMOCK_PORT:-18089}:8080"
    command:
      - --verbose
      - --global-response-templating
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/__admin/mappings || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - appnet

  influxdb:
    profiles: ["monitoring"]
    image: influxdb:1.8
    container_name: jems-influxdb
    environment:
      TZ: Asia/Tokyo
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_DB: ${INFLUXDB_DB:-ci_metrics}
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpass}
      INFLUXDB_USER: ${INFLUXDB_USER:-ci_writer}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD:-ci_writer_pass}
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - ../dist/monitoring/influxdb:/var/lib/influxdb
    healthcheck:
      test: ["CMD-SHELL", "influx -host 127.0.0.1 -port 8086 -username $$INFLUXDB_ADMIN_USER -password $$INFLUXDB_ADMIN_PASSWORD -execute 'SHOW DATABASES' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - appnet

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.1.0
    container_name: jems-grafana
    user: "472:472"
    environment:
      TZ: Asia/Tokyo
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      INFLUXDB_DB: ${INFLUXDB_DB:-ci_metrics}
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpass}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/modern-observability-overview.json
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ../dist/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - appnet

  mysqld-exporter:
    profiles: ["monitoring"]
    image: prom/mysqld-exporter:v0.17.2
    container_name: jems-mysqld-exporter
    command:
      - --mysqld.address=mysql:3306
      - --mysqld.username=${MYSQL_EXPORTER_USER:-root}
    environment:
      TZ: Asia/Tokyo
      MYSQLD_EXPORTER_PASSWORD: ${MYSQL_EXPORTER_PASSWORD:-root}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: jems-redis-exporter
    environment:
      TZ: Asia/Tokyo
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - appnet

  otel-collector:
    profiles: ["monitoring"]
    image: otel/opentelemetry-collector-contrib:0.137.0
    container_name: jems-otel-collector
    environment:
      TZ: Asia/Tokyo
    command: ["--config", "/etc/otel/config.yaml"]
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_PROM_PORT:-9464}:9464"
    depends_on:
      influxdb:
        condition: service_healthy
      mysqld-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./otel/otel-collector.yaml:/etc/otel/config.yaml:ro
    networks:
      - appnet

  otel-metrics:
    profiles: ["monitoring"]
    image: curlimages/curl:8.12.1
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      TZ: Asia/Tokyo
      OTEL_METRICS_ENDPOINT: ${OTEL_METRICS_ENDPOINT:-http://otel-collector:9464/metrics}
      OTEL_INTERNAL_METRICS_ENDPOINT: ${OTEL_INTERNAL_METRICS_ENDPOINT:-http://otel-collector:8888/metrics}
    depends_on:
      - otel-collector
    command:
      - |
        primary_body="$$(curl -fsS "$${OTEL_METRICS_ENDPOINT}" 2>/dev/null || true)"
        if [ -n "$${primary_body}" ]; then
          printf '%s\n' "$${primary_body}"
          exit 0
        fi
        echo "[otel-metrics] Primary endpoint returned empty body: $${OTEL_METRICS_ENDPOINT}" >&2
        echo "[otel-metrics] Fallback to internal telemetry endpoint: $${OTEL_INTERNAL_METRICS_ENDPOINT}" >&2
        fallback_body="$$(curl -fsS "$${OTEL_INTERNAL_METRICS_ENDPOINT}" 2>/dev/null || true)"
        if [ -n "$${fallback_body}" ]; then
          printf '%s\n' "$${fallback_body}"
          exit 0
        fi
        echo "# no metrics payload available from $${OTEL_METRICS_ENDPOINT}" \
          "or $${OTEL_INTERNAL_METRICS_ENDPOINT}"
    networks:
      - appnet

  trivy:
    profiles: ["security"]
    image: aquasec/trivy:0.65.0
    working_dir: /workspace
    environment:
      TZ: Asia/Tokyo
    command:
      - fs
      - --scanners
      - vuln,misconfig
      - --severity
      - ${TRIVY_SEVERITY:-HIGH,CRITICAL}
      - --ignore-unfixed
      - --format
      - json
      - --output
      - /reports/trivy-fs.json
      - --exit-code
      - ${TRIVY_EXIT_CODE:-1}
      - --timeout
      - ${TRIVY_TIMEOUT:-10m}
      - ${TRIVY_TARGET_DIR:-/workspace}
    volumes:
      - ..:/workspace:ro
      - ../dist/security:/reports

  gitleaks:
    profiles: ["security"]
    image: zricethezav/gitleaks:latest
    working_dir: /workspace
    environment:
      TZ: Asia/Tokyo
    command:
      - dir
      - --report-format=sarif
      - --report-path=/reports/gitleaks.sarif
      - --exit-code=${GITLEAKS_EXIT_CODE:-1}
      - --redact
      - ${GITLEAKS_SOURCE_DIR:-.}
    volumes:
      - ..:/workspace:ro
      - ../dist/security:/reports
