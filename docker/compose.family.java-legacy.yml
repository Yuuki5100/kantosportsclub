services:
  tomcat:
    # Legacy baseline: Java 1.8.0_202 + Apache Tomcat 6.0.43 (+ optional 6.zip overlay)
    build:
      context: ..
      dockerfile: docker/java-legacy/tomcat6-jdk8/Dockerfile
      args:
        TOMCAT_VERSION: ${JAVA_LEGACY_TOMCAT_VERSION:-6.0.43}
    container_name: jems-java-legacy-tomcat
    environment:
      TZ: Asia/Tokyo
      CATALINA_OPTS: -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Tokyo
    ports:
      - "${JAVA_LEGACY_TOMCAT_PORT:-18080}:8080"
    volumes:
      - ../dist/java-legacy/tomcat/webapps:/usr/local/tomcat/webapps
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/local/tomcat/bin/catalina.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - appnet

  apache:
    image: httpd:2.4
    container_name: jems-java-legacy-apache
    depends_on:
      tomcat:
        condition: service_started
    environment:
      TZ: Asia/Tokyo
    ports:
      - "${JAVA_LEGACY_APACHE_PORT:-8088}:80"
    command:
      - httpd-foreground
      - -C
      - Include conf/extra/jems-legacy-proxy.conf
    volumes:
      - ./java-legacy/apache/jems-legacy-proxy.conf:/usr/local/apache2/conf/extra/jems-legacy-proxy.conf:ro
      - ../dist/java-legacy/apache/htdocs:/usr/local/apache2/htdocs
    healthcheck:
      test: ["CMD-SHELL", "httpd -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - appnet

  influxdb:
    profiles: ["monitoring"]
    image: influxdb:1.8
    container_name: jems-java-legacy-influxdb
    environment:
      TZ: Asia/Tokyo
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_DB: ${INFLUXDB_DB:-ci_metrics}
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpass}
      INFLUXDB_USER: ${INFLUXDB_USER:-ci_writer}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD:-ci_writer_pass}
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - ../dist/java-legacy/monitoring/influxdb:/var/lib/influxdb
    healthcheck:
      test: ["CMD-SHELL", "influx -host 127.0.0.1 -port 8086 -username $$INFLUXDB_ADMIN_USER -password $$INFLUXDB_ADMIN_PASSWORD -execute 'SHOW DATABASES' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - appnet

  otel-collector:
    profiles: ["monitoring"]
    image: otel/opentelemetry-collector-contrib:0.137.0
    container_name: jems-java-legacy-otel-collector
    environment:
      TZ: Asia/Tokyo
    command: ["--config", "/etc/otel/config.yaml"]
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_PROM_PORT:-9464}:9464"
    depends_on:
      influxdb:
        condition: service_healthy
      apache:
        condition: service_healthy
      tomcat:
        condition: service_healthy
    volumes:
      - ./otel/otel-collector.java-legacy.yaml:/etc/otel/config.yaml:ro
    networks:
      - appnet

  otel-metrics:
    profiles: ["monitoring"]
    image: curlimages/curl:8.12.1
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      TZ: Asia/Tokyo
      OTEL_METRICS_ENDPOINT: ${OTEL_METRICS_ENDPOINT:-http://otel-collector:9464/metrics}
      OTEL_INTERNAL_METRICS_ENDPOINT: ${OTEL_INTERNAL_METRICS_ENDPOINT:-http://otel-collector:8888/metrics}
    depends_on:
      - otel-collector
    command:
      - |
        primary_body="$$(curl -fsS "$${OTEL_METRICS_ENDPOINT}" 2>/dev/null || true)"
        if [ -n "$${primary_body}" ]; then
          printf '%s\n' "$${primary_body}"
          exit 0
        fi
        echo "[otel-metrics] Primary endpoint returned empty body: $${OTEL_METRICS_ENDPOINT}" >&2
        echo "[otel-metrics] Fallback to internal telemetry endpoint: $${OTEL_INTERNAL_METRICS_ENDPOINT}" >&2
        fallback_body="$$(curl -fsS "$${OTEL_INTERNAL_METRICS_ENDPOINT}" 2>/dev/null || true)"
        if [ -n "$${fallback_body}" ]; then
          printf '%s\n' "$${fallback_body}"
          exit 0
        fi
        echo "# no metrics payload available from $${OTEL_METRICS_ENDPOINT}" \
          "or $${OTEL_INTERNAL_METRICS_ENDPOINT}"
    networks:
      - appnet
