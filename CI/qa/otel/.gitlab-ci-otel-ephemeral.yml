otel-sandbox:
  stage: collect
  image: docker:25.0.3
  needs: []
  rules:
    - when: always
  services:
    - name: docker:25.0.3-dind
      alias: docker
      variables: { DOCKER_TLS_CERTDIR: "" }
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # CI/CD 変数で設定していない場合は空のまま
    COLLECTOR_HOST: "${COLLECTOR_HOST}"

    # 既定は送信オフ（COLLECTOR_HOST があるときだけ下で上書き）
    OTEL_SERVICE_NAME: "myproject-ci"
    OTEL_TRACES_EXPORTER: "none"
    OTEL_METRICS_EXPORTER: "none"
    OTEL_LOGS_EXPORTER: "none"

  tags: [docker-runner]

  before_script:
    - apk add --no-cache curl bash jq
    - |
      for i in $(seq 1 60); do
        if docker info >/dev/null 2>&1; then echo "✅ Docker daemon is up"; break; fi
        echo "⏳ Waiting for Docker daemon... ($i/60)"; sleep 2
      done

    # COLLECTOR_HOST があるときだけ疎通確認 & エンドポイント設定
    - |
      if [ -n "$COLLECTOR_HOST" ]; then
        echo "Collector host: $COLLECTOR_HOST"
        for i in $(seq 1 20); do
          if curl -fsS "http://${COLLECTOR_HOST}:9464/metrics" >/dev/null; then
            echo "✅ Remote Collector metrics endpoint ok"; break
          fi
          echo "⏳ waiting remote collector... ($i/20)"; sleep 3
        done || true
        export OTEL_EXPORTER_OTLP_ENDPOINT="http://${COLLECTOR_HOST}:4317"
        export OTEL_METRICS_EXPORTER="otlp"
      else
        echo "ℹ️ COLLECTOR_HOST not set -> skip collector check & OTLP sending"
      fi

    # Java Agent 取得（← バックスラッシュをやめて1行に）
    - curl -L -o opentelemetry-javaagent.jar https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/download/v2.9.0/opentelemetry-javaagent.jar

  script:
    - >
      docker run --rm
      -v "$PWD:/workspace" -w /workspace
      -v "$PWD/opentelemetry-javaagent.jar:/agent/opentelemetry-javaagent.jar:ro"
      -e MAVEN_OPTS="-Dmaven.repo.local=/workspace/.m2/repository"
      -e JAVA_TOOL_OPTIONS="-javaagent:/agent/opentelemetry-javaagent.jar"
      -e OTEL_SERVICE_NAME="$OTEL_SERVICE_NAME"
      -e OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      -e OTEL_TRACES_EXPORTER="$OTEL_TRACES_EXPORTER"
      -e OTEL_METRICS_EXPORTER="$OTEL_METRICS_EXPORTER"
      -e OTEL_LOGS_EXPORTER="$OTEL_LOGS_EXPORTER"
      -e OTEL_RESOURCE_ATTRIBUTES="env=ci,service.version=${CI_COMMIT_SHORT_SHA},project=${CI_PROJECT_PATH},job=${CI_JOB_NAME},branch=${CI_COMMIT_REF_NAME}"
      maven:3.9.4-eclipse-temurin-17
      mvn -B -U test || true

  after_script:
    - ":"  # no-op

  artifacts:
    when: always
    paths: []
    expire_in: 3 days

  allow_failure: true
