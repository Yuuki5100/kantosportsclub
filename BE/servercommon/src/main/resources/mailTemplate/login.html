<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>アカウント情報のご案内</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.6;
      color: #333;
    }
    .container {
      padding: 20px;
      background-color: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 6px;
      max-width: 600px;
      margin: auto;
    }
    .login-info {
      background-color: #fff;
      padding: 15px;
      border-radius: 4px;
      margin-top: 10px;
    }
    .label {
      font-weight: bold;
    }
    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>ようこそ、<span th:text="${username}">ユーザー名</span> さん</h2>

    <p>
      アカウントが作成されました。以下の情報を使用してログインしてください。
    </p>

    <div class="login-info">
      <p><span class="label">ログインID（メールアドレス）:</span> <span th:text="${email}">user@example.com</span></p>
      <p><span class="label">仮パスワード:</span> <span th:text="${temporaryPassword}">********</span></p>
    </div>

    <p>
      初回ログイン後はパスワードの変更をお願いいたします。
    </p>

    <a class="button" th:href="${loginUrl}">ログイン画面へ</a>

    <p style="margin-top: 30px; font-size: 0.9em; color: #999;">
      本メールは自動送信されています。ご不明な点がある場合は管理者までお問い合わせください。
    </p>
  </div>
</body>
</html>
