templateId: users
version: v1
entity: com.example.model.User
repository: userRepository

columns:
  - name: username
    field: username
    required: true
    maxLength: 50

  - name: password
    field: password
    required: true
    maxLength: 100

  - name: email
    field: email
    required: false
    dynamicRequiredRule: com.example.servercommon.validationtemplate.rule.sample.RequireEmailUnlessGuest
    maxLength: 100
    pattern: ".+@.+"

  - name: role
    field: role
    required: true
    enumValues: [USER, ADMIN, GUEST]
