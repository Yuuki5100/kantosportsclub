E1002 = {0} は {1} 文字以内で入力してください。
E1003 = {0} は最低 {1} 文字必要です。
E1004 = {0} の形式が正しくありません。
E1005 = {0} は有効なメールアドレス形式である必要があります。
E1006 = {0} は半角数字のみで入力してください。
E1007 = {0} の形式が正しくありません（例：000-1234-555）。
E1008 = {0} の形式が正しくありません（例：123-4567）。

# ジョブ処理エラー（FileImportRunner）
