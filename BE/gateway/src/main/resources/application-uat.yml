spring:
  config:
    activate:
      on-profile: uat
  redis:
    host: ${REDIS_HOST:uat-redis-host}
    port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET_DEV}

teams:
  webhook:
    url: ${TEAMS_WEBHOOK_DEV}

gateway:
  ip-whitelist: 127.0.0.1, ::1
  public-paths:
    - /login
    - /logout
    - /public
    - /actuator
    - /health
    - /api/app/ratelimit-test
    - /api/auth/login
    - /api/auth/refresh

