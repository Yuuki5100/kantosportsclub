spring:
  config:
    activate:
      on-profile: local

# ==============================
# Appserver 用（8081）
# ==============================
appserver:
  server:
    port: 8081
  spring:
    datasource:
      url: jdbc:mysql://localhost:3306/common
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: root
      password: admin
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
    session:
      store-type: jdbc
    flyway:
      enabled: false
  jwt:
    secret: 9Z7dhgOfEYM1wn+K3BVKzZ9qrG1C3BGOWFmc+q3A0RZbhH+0v2K7cF5VvwCqOAUHTqNqZY+cIT6VEt3JKbcQdg==
    expiration: 86400000
  teams:
    webhook:
      url: https://your.teams.webhook.url
  config:
    import: "classpath:config/endpoint-permission.yml"

# ==============================
# Batchserver 用
# ==============================
batchserver:
  spring:
    datasource:
      url: jdbc:mysql://localhost:3306/common
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: root
      password: admin
    jpa:
      hibernate:
        ddl-auto: update
    batch:
      initialize-schema: always
    flyway:
      enabled: false
  storage:
    type: s3
    s3:
      endpoint: http://57.182.223.75:9000
      access-key: minio
      secret-key: minio1234
      bucket: file-import
      input-dir: input
      archive-dir: archive
      error-dir: error
  teams:
    webhook:
      url: https://your.teams.webhook.url
  logging:
    level:
      root: DEBUG
    appender: PLAIN_CONSOLE
    file:
      path: logs/${spring.application.name}

# ==============================
# Gateway 用（ポート自由）
# ==============================
gateway:
  server:
    port: 8888
  spring:
    main:
      web-application-type: reactive
    redis:
      host: localhost
      port: 6379
    codec:
      max-in-memory-size: 10MB
  jwt:
    secret: this-is-a-very-secure-secret-key-3f849f0b-...
  gateway:
    ip-whitelist: 127.0.0.1, ::1
    public-paths:
      - /login
      - /logout
      - /public
      - /actuator
      - /health
      - /api/app/ratelimit-test
  cors:
    allowed-origins:
      - http://localhost:3000
  teams:
    webhook:
      url: https://example.com/dummy-webhook-url

# ==============================
# Servercommon 用（必要最小限）
# ==============================
servercommon:
  spring:
    profiles:
      active: local
  logging:
    level:
      root: DEBUG
    appender: PLAIN_CONSOLE
    file:
      path: logs
