templateId: orders
entity: com.example.servercommon.model.Orders
repository: ordersRepository
version: v1

columns:
  - field: orderId
    name: orderId
    required: true
    type: string

  - field: productName
    name: productName
    required: true
    type: string

  - field: quantity
    name: quantity
    required: true
    type: number
    pattern: ^\d+$
    validationMessage: 数量は 1 以上の整数で入力してください。

  - field: price
    name: price
    required: false
    type: number
    pattern: ^\d+(\.\d{1,2})?$
    validationMessage: 価格は小数点2桁までの数値で入力してください。

  - field: orderDate
    name: orderDate
    required: false
    type: string
    pattern: ^\d{4}-\d{2}-\d{2}$
    validationMessage: 注文日は YYYY-MM-DD の形式で入力してください。
