server:
  port: 8081
  servlet:
    session:
      cookie:
        name: JSESSIONID
        http-only: true
        secure: false # ← HTTP環境ではfalse
        same-site: lax # ← Edge対応のためLax推奨
        path: /

security:
  rsa-public-key:
    modulus-base64: 'ALlQ9XnH/0W0nUuOAz5kz5nkt8dHjGl5V9V2vblqJmQF3pOtKpyX6GZ+W9D3xIZw7dLrZUPPMp4x6BLsJwrImz8='
    exponent-base64: 'AQAB'
  auth:
    mode: jwt # jwt or session
  authorization:
    legacy-interceptor-enabled: false
  permission:
    legacy-endpoint-config-enabled: false
    cache-refresh-fixed-delay-ms: 600000
    method-security-allow-if-unmapped: true
    method-security-default-method: GET

spring:
  application:
    name: appserver
  datasource:
      url: jdbc:mysql://localhost:3306/kantosportsclub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
      username: app
      password: app
  hikari:
    connection-init-sql: SET time_zone = '+00:00'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: Asia/Tokyo

  session:
    store-type: jdbc
    timeout: 180000

  codec:
    max-in-memory-size: 10MB

  config:
    import:
      - classpath:config/endpoint-permission.yml
      - classpath:config/allowlist.yml

  flyway:
    enabled: false
  sql:
    init:
      mode: always

logging:
  level:
    root: DEBUG
    org.apache.http.wire: OFF
    org.apache.http.headers: INFO
  appender: PLAIN_CONSOLE
  file:
    path: logs/${spring.application.name}

management:
  endpoints:
    web:
      exposure:
        include: configprops,health,info
  security:
    enabled: false

jwt:
  secret: 9Z7dhgOfEYM1wn+K3BVKzZ9qrG1C3BGOWFmc+q3A0RZbhH+0v2K7cF5VvwCqOAUHTqNqZY+cIT6VEt3JKbcQdg==
  mode: access-refresh # ← legacy にすると jwt.expiration の値を使用
  expiration: 86400000 # 旧トークン用（24時間）
  access:
    expiration-ms: 5400000 # For Access Token Expiry 90 Min
    buffer-ms: 2700000 # For Access Token Buffer 45 Min
  refresh:
    expiration-ms: 28800000 # For Refresh Token 8 Hr
  security:
    cookie:
      domain: example.com
      secure: true
      same-site: Strict

storage:
  # type: local
  type: s3
  s3:
    endpoint: http://57.182.223.75:9080
    access-key: minio
    secret-key: minio1234
    bucket: reports
    input-dir: input
    archive-dir: archive
    error-dir: error

mail:
