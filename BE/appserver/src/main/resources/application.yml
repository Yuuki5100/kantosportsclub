teams:
  webhook:
    url: https://your.teams.webhook.url

file:
  validation-error:
    output-path: tmp/

template:
  schema:
    base-path: classpath:config/templates

report:
  cache:
    enabled: false

system:
  setting:
    cache:
      enabled: true
      ttl-seconds: 300
      max-entries: 512

async:
  job:
    status-ttl-minutes: 60
    cleanup-fixed-delay-ms: 600000
    cleanup-batch-size: 100
    artifact-prefix: async-jobs

auth:
  type: internal
  cookie:
    secure: true
    sameSite: Lax
    accessPath: /api
  gbiz:
    auth-url: http://localhost:4000/oauth/authorize
    token-url: http://localhost:4000/oauth/token
  internal:
    auth-url: http://internal.auth.local/oauth/authorize
    token-url: http://internal.auth.local/oauth/token
external:
  batchserver:
    url: http://localhost:8083

# aws:
#   auth:
#     mode: instance # static / instance（ローカルで上書き）

sync:
  signature:
    secret: ${SYNC_SECRET_KEY:local-sync-secret}
    secretKey: ${SYNC_SECRET_KEY:local-sync-secret}
    signature-header: X-Signature
    target-paths:
      - /api/inventory/reservations/sync
  signed-rest:
    secret-key: ${SYNC_SECRET_KEY:local-sync-secret}
    signature-header: X-Signature
  remote:
    base-url: ${SYNC_REMOTE_BASE_URL:https://remote.example.local}
    inventory:
      reservation-update-path: /api/inventory/reservations/sync
    notice:
      notice-changed-path: /api/notice/sync
  outbox:
    use: false
    max-retry: 10
    fixed-delay-ms: 60000
    dispatch-limit: 100

routePath:
  apiPattern: /api/app/**
  apiPattern-ws: /api/ws/**
  batchPattern: /api/batch/**
  apiPattern-sc-send: /api/sc/send/**
  apiPattern-sc-receive: /api/sc/receive/**
  apiUri: http://localhost:8081
  batchUri: http://localhost:8083
  syncUri: http://localhost2:8888

usegateway: false
gateway:
  header: X-Gateway-Token
  token: ${GATEWAY_TOKEN:super-secret-token}

reports:
  zip:
    max-files: 10
    time-budget: 45s
    attach-errors-txt: true

notify:
  queue:
    scan:
      limit: 100
      fixed-delay-ms: 10000000
      max-retry: 5
      backoff-initial-delay-ms: 1000
      backoff-multiplier: 2.0
      backoff-max-delay-ms: 60000
