# mail:
#   access-key: ${access-key}
#   secret-key: ${secret-key}+
#   from: xx@crj.dev.jems-cloud.jp

jwt:
  secret: ${JWT_SECRET_DEV}

teams:
  webhook:
    url: ${TEAMS_WEBHOOK_DEV}

logging:
  level:
    root: INFO
  appender: PLAIN_CONSOLE


report:
  cache:
    enabled: true  # ← falseにすればキャッシュ無効で毎回DB取得
