security:
  allowlist:
    paths:
      - /auth/login
      - /api/auth/login
      - /auth/refresh
      - /api/auth/refresh
      - /auth/external-login
      - /api/auth/external-login
      - /auth/callback
      - /api/auth/callback
      - /swagger-ui/**
      - /v3/api-docs/**
      - /actuator/**
      - /batch-runner/**
      - /api/test/**
      - /import/**
      - /report/**
      - /files/**
      - /api/files/**
      - /user/forgot-password
      - /api/user/forgot-password
      - /user/reset-password/**
      - /api/user/reset-password/**
      - /error
