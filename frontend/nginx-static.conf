server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA / static export routing
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # Cache immutable assets
  location /_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
